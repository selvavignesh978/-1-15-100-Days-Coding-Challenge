<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header section-->
     <header>
        <!-- navigitaion section -->
         <div id="navbar">
            <!-- logo section -->
             <div id="logo">Instagram</div>
             <!-- search bar -->
             <div id="search">
                <input type="text" placeholder="Search">
            </div>
            <!-- Navigation icons -->
             <div id="nav-icons">
                <span>🏠</span>
                <span>💬</span>
                <span>➕</span>
                <span>❤️</span>
                <span>👤</span>
             </div>
         </div>
     </header>
     <!-- main contant -->
     <main id="container">
        <!--  -->
        <section id="profile-header">
            <!-- profile images -->
            <div id="profile-img">
                <img src="images/Selva_2.jpeg" alt="profile">
            </div>
            <!-- profile-info -->
            <div id="profile-info">
            <div id="username">
                <h2>Selva27M97</h2>
                <button class="btn">Edit profile</button>
                <button class="btn">View archive</button>
            </div>
            <!-- row wise contant -->
            <div id="stats">
                <p><span>0</span> posts</p>
                <p><span>16</span> followers</p>
                <p><span>64</span> following</p>                
            </div>
               <!-- bio contant -->
            <div id="bio">
                <p><b>Selva_Vignesh</b></p>
                <p>Night🚗 Traveler🌍 </p>
                <p>Cool under pressure, colder with silence.</p>                    
            </div>
            </div>
        </section>
        <section>
            <!-- Highlights -->
             <div id="highlights">
                <div id="highlight">
                    <div id="highlight-circle">+</div>
                    <p>New</p>
                </div>
            </div>
        </section>
        <section>
            <!-- Tabs -->
             <div id="tabs">
                <div>Posts</div>
                <div>Saved</div>
                <div>Reels</div>
                <div>Tagged</div>
            </div>
        </section>
        <section>
            <!-- Post Grid -->
             <div id="post-grid">
                <div class="post"><img src="images/Selva_6.jpeg"  width="280px"></div>
                <div class="post"><img src="images/Selva_3.jpeg"  width="280px"></div>
                <div class="post"><img src="images/Selva_4.jpeg"   width="280px"></div>
                <div class="post"><img src="images/Selva_5.jpeg" width="280px"></div>
                <div class="post"><img src="images/Selva_7.jpeg" width="280px"></div>
                <div class="post"><img src="images/Selva_8.jpeg"   width="280px"></div>
            </div>            
        </section>
        <section>
            <!-- Empty Section (Optional) -->
             <div id="empty-post">
                <div id="camera">📷</div>
                <h2>Share Photos</h2>
                <p>When you share photos, they will appear on your profile.</p>
                <a href="#">Share your first photo</a>
            </div>
        </section>

     </main>
    
</body>
</html>
