<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft  Page</title>
</head>
<body>

    <h1>Welcome to Our Web App</h1>

    <!-- Login Section -->
    <section>
        <h2>Login</h2>
        <form>
            <label>Email:</label><br>
            <input type="email" name="loginEmail" required placeholder="abc@gmail.com"><br><br>

            <label>Password:</label><br>
            <input type="password" name="loginPassword" required placeholder="********"><br><br>

            <button type="submit">Login</button>
        </form>
    </section>

    <hr>

    <!-- Signup Section -->
    <section>
        <h2>Sign Up</h2>
        <form>
            <label>Full Name:</label><br>
            <input type="text" name="fullName" required placeholder="Name"><br><br>

            <label>Email:</label><br>
            <input type="email" name="signupEmail" required placeholder="abc@gmail.com"><br><br>

            <label>Password:</label><br>
            <input type="password" name="signupPassword" required placeholder="********"><br><br>

            <label>Confirm Password:</label><br>
            <input type="password" name="confirmPassword" required placeholder="********"><br><br>

            <button type="submit">Sign Up</button>
        </form>
    </section>
    <hr>

</body>
</html>
